version: "1.0"
prompts:
  greeting:
    text: "Здравствуйте! Меня зовут Елена, я ваш персональный менеджер. Как ваши дела?"
  refusal_handling:
    text: "Я понимаю ваше нежелание продолжать разговор. Возможно, я могу перезвонить в другое время?"
  planning_system:
    text: >
      Ты — AI-планировщик VoiceGraph. На основе цели кампании сгенерируй
      3-5 вариантов скриптов обзвона. Учти исторические данные конверсии
      и эмоциональный профиль аудитории.
  reflection_system:
    text: >
      Ты — аналитик VoiceGraph. Проанализируй результаты звонков кампании.
      Выяви коренные причины отказов и предложи конкретные изменения скриптов.
