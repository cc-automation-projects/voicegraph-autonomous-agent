[transport-webrtc-bridge]
type=transport
protocol=udp
bind=0.0.0.0:5060

[webrtc-bridge]
type=endpoint
context=from-bridge
disallow=all
allow=opus,ulaw,alaw
dtmf_mode=rfc4733
direct_media=no
webrtc=yes
rtp_symmetric=yes
force_rport=yes

[webrtc-bridge-auth]
type=auth
auth_type=userpass
username=voicegraph_bridge
password=SuperSecretBridgePassword2026!

[webrtc-bridge-aor]
type=aor
max_contacts=100
remove_existing=yes

[outbound-trunk]
type=endpoint
context=from-trunk
disallow=all
allow=opus,ulaw,alaw
outbound_auth=trunk-auth
aors=trunk-aor

[trunk-auth]
type=auth
auth_type=userpass
username=YOUR_PROVIDER_LOGIN
password=YOUR_PROVIDER_PASSWORD

[trunk-aor]
type=aor
contact=sip:provider.example.com:5060
