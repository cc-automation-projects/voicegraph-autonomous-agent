global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "voicegraph-voice-worker"
    static_configs:
      - targets: ["voice-worker:8001"]

  - job_name: "voicegraph-orchestrator"
    static_configs:
      - targets: ["orchestrator:8001"]

  - job_name: "voicegraph-propensity"
    static_configs:
      - targets: ["propensity-inference:8000"]

  - job_name: "voicegraph-yandexgpt-gateway"
    static_configs:
      - targets: ["yandexgpt-gateway:8002"]

  - job_name: "vllm"
    static_configs:
      - targets: ["vllm-service:8000"]

  - job_name: "qdrant"
    static_configs:
      - targets: ["qdrant-service:6333"]
