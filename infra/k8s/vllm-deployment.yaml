apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-inference
  namespace: voicegraph-prod
  labels:
    app: vllm-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-inference
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: vllm-inference
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        accelerator: nvidia-h100
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Equal"
          value: "present"
          effect: "NoSchedule"
      containers:
        - name: vllm-server
          image: vllm/vllm-openai:v0.6.1
          command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - "--model"
            - "Qwen/Qwen2.5-72B-Instruct"
            - "--tensor-parallel-size"
            - "4"
            - "--gpu-memory-utilization"
            - "0.90"
            - "--enable-prefix-caching"
            - "true"
            - "--max-num-seqs"
            - "128"
            - "--max-model-len"
            - "8192"
            - "--dtype"
            - "bfloat16"
            - "--disable-log-requests"
            - "--port"
            - "8000"
          ports:
            - containerPort: 8000
              name: http
          resources:
            limits:
              nvidia.com/gpu: 4
              memory: "256Gi"
              cpu: "32"
            requests:
              nvidia.com/gpu: 4
              memory: "256Gi"
              cpu: "32"
          env:
            - name: VLLM_WORKER_MULTIPROC_METHOD
              value: "spawn"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 30
          volumeMounts:
            - name: hf-cache
              mountPath: /.cache/huggingface
      volumes:
        - name: hf-cache
          emptyDir:
            medium: Memory
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-service
  namespace: voicegraph-prod
spec:
  selector:
    app: vllm-inference
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
