apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: livekit-voice-worker-hpa
  namespace: voicegraph-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: livekit-voice-worker
  minReplicas: 2
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
